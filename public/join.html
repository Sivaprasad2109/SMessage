<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Room</title><link rel="stylesheet" href="style.css" />
</head>
<body class="sm-page-bg">
  <main class="sm-center-wrap">
    <section class="sm-app-card">
      <p class="sm-subtitle">Choose your avatar:</p>
      <div class="sm-avatar-grid" id="avatarSelector">
        <img src="f1.png" class="sm-avatar-img selected" data-avatar="f1.png">
        <img src="f2.png" class="sm-avatar-img" data-avatar="f2.png">
        <img src="f3.png" class="sm-avatar-img" data-avatar="f3.png">
        <img src="f4.png" class="sm-avatar-img" data-avatar="f4.png">
        <img src="f5.png" class="sm-avatar-img" data-avatar="f5.png">
        <img src="f6.png" class="sm-avatar-img" data-avatar="f6.png">
        
        <img src="m1.png" class="sm-avatar-img" data-avatar="m1.png">
        <img src="m2.png" class="sm-avatar-img" data-avatar="m2.png">
        <img src="m3.png" class="sm-avatar-img" data-avatar="m3.png">
        <img src="m4.png" class="sm-avatar-img" data-avatar="m4.png">
        <img src="m5.png" class="sm-avatar-img" data-avatar="m5.png">
        <img src="m6.png" class="sm-avatar-img" data-avatar="m6.png">
      </div>
      <h1 class="sm-app-title">Join Chat</h1>
      <input type="text" id="nameInput" placeholder="Your name..." class="sm-message-input" />
      <div id="roomDisplay" style="margin: 15px 0; font-weight: 600; color: #0a3d91;"></div>
      <button id="joinBtn" class="sm-btn sm-big">Join Chat</button>
    </section>
  </main>
  <script src="crypto-js/crypto-js.js"></script>
<script>
(() => {
    const params = new URLSearchParams(window.location.search);
    let roomId = params.get("room") || localStorage.getItem("last_room_id");
    let passcode = params.get("p") || localStorage.getItem("last_passcode");
    let expireAt = params.get("expireAt") || localStorage.getItem("last_expire_at");

    if (!roomId || roomId === "null") { window.location.href = "index.html"; return; }

    const secretKey = CryptoJS.SHA256(passcode).toString();
    document.getElementById("roomDisplay").textContent = `Room Code: ${passcode}`;
    
    const nameInput = document.getElementById("nameInput");
    nameInput.value = localStorage.getItem("blinkchat_name") || "";

    // --- NEW: AVATAR SELECTION LOGIC ---
    let selectedAvatar = "f1.png"; // Default selection

    document.querySelectorAll('.sm-avatar-img').forEach(img => {
        img.addEventListener('click', () => {
            // Remove 'selected' class from all images
            document.querySelectorAll('.sm-avatar-img').forEach(i => i.classList.remove('selected'));
            // Add 'selected' class to the clicked one
            img.classList.add('selected');
            // Update the variable with the filename
            selectedAvatar = img.getAttribute('data-avatar');
        });
    });

    document.getElementById("joinBtn").addEventListener("click", () => {
        const name = nameInput.value.trim() || "Guest";
        
        // Store locally
        localStorage.setItem("blinkchat_name", name);
        localStorage.setItem("sm_last_avatar", selectedAvatar);
        localStorage.setItem("last_room_id", roomId);
        localStorage.setItem("last_passcode", passcode);
        localStorage.setItem("last_secret_key", secretKey);
        localStorage.setItem("last_expire_at", expireAt);

        // Pass name AND avatar as URL parameters
        window.location.href = `chat.html?room=${roomId}&p=${passcode}&key=${secretKey}&expireAt=${expireAt}&name=${encodeURIComponent(name)}&avatar=${selectedAvatar}`;
    });
})();
</script>
</body>
</html>
