<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMessage Chat</title><link rel="stylesheet" href="style.css" />
  <script src="https://blinkchat-i72t.onrender.com/socket.io/socket.io.js"></script>
  <script src="crypto-js/crypto-js.js"></script>
</head>
<body class="sm-page-bg">
  <main class="sm-chat-wrap">
    <header class="sm-chat-header">
  <div class="sm-header-info">
    <div class="sm-chat-title" style="font-weight: 600;">Private Room</div>
    <div class="sm-chat-sub" style="font-size: 0.75rem; opacity: 0.8;">Encrypted</div>
  </div>
  <div class="sm-room-meta">
    <button id="reportBtn" class="sm-btn" style="background: rgba(255,255,255,0.15); color: #fff; padding: 6px 10px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3); margin-right: 5px;">🚩 Report</button>
    
    <span id="roomIdBox" style="font-size: 0.85rem; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 6px;"></span>
    <span id="timerBox" style="font-family: monospace; font-weight: bold;">00:00</span>
    <button id="quitBtn" class="sm-btn" style="background:#fff; color:#0a53c9; padding: 6px 12px; font-size: 0.85rem; border-radius: 8px;">Quit</button>
  </div>
</header>
    <section class="sm-chat-card">
      <div id="typingIndicator" style="display:none; text-align:center;">Friend is typing...</div>
      <div id="messages" class="sm-messages"></div>
      <div class="sm-input-row">
        <textarea id="messageInput" class="sm-message-input" placeholder="Type..." rows="1"></textarea>
        <button id="sendBtn" class="sm-send-btn">Send</button>
      </div>
    </section>
  </main>
<script>
if (window.Android) window.Android.setBannerVisible(false);
(() => {
    const socket = io("https://blinkchat-i72t.onrender.com", { transports: ["websocket", "polling"], reconnection: true });
    const params = new URLSearchParams(window.location.search);
    
    let roomId = params.get("room") || localStorage.getItem("last_room_id");
    let passcode = params.get("p") || localStorage.getItem("last_passcode");
    let secretKey = params.get("key") || localStorage.getItem("last_secret_key");
    let expireAt = Number(params.get("expireAt")) || Number(localStorage.getItem("last_expire_at")) || 0;
    let myName = params.get("name") || localStorage.getItem("blinkchat_name") || "Guest";

    if (!roomId || roomId === "null") { window.location.href = "index.html"; return; }

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    // --- KEYBOARD & LAYOUT FIXES ---

// FIX 1: Prevent keyboard from disappearing when clicking 'Send'
// 'mousedown' happens before 'click' and 'focusout'
sendBtn.addEventListener("mousedown", (e) => {
    e.preventDefault(); // Prevents the input from losing focus
});

// FIX 2: Handle Send Button Click (keeping focus)
sendBtn.addEventListener("click", () => {
    sendMessage();
    input.focus(); // Re-focus just in case of a glitch
});

// FIX 3: Handle 'Enter' key without a new line or losing focus
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault(); // Stops the new line (\n)
        sendMessage();
        // Focus stays on input, so keyboard stays up
    }
});
    let replyToMsg = null; // Tracks which message is being replied to

    document.getElementById("roomIdBox").textContent = `Code: ${passcode}`;

    // --- 1. ACTIVE USER COUNT UI UPDATE ---
    socket.on("updateUserCount", (count) => {
        const subHeader = document.querySelector(".sm-chat-sub");
        if (count >= 2) {
            subHeader.textContent = "Friend Joined";
            subHeader.style.color = "#4CAF50"; 
        } else {
            subHeader.textContent = "Waiting for friend...";
            subHeader.style.color = "rgba(255,255,255,0.8)";
        }
    });

    // --- 2. MESSAGE SEEN LOGIC ---
    socket.on("newMessage", ({ message, from, msgId }) => {
        try {
            const dec = CryptoJS.AES.decrypt(message, secretKey).toString(CryptoJS.enc.Utf8);
            if (dec) {
                addMessage(from, dec, "left", msgId);
                // Tell server we saw it
                socket.emit("messageSeen", { roomId, msgId });
            }
        } catch (e) { addMessage("System", "[Decryption Error]", "center"); }
    });

    socket.on("msgStatusUpdate", ({ msgId, status }) => {
        const statusEl = document.querySelector(`[data-id="${msgId}"] .sm-status`);
        if (statusEl) statusEl.textContent = "✔✔"; // Double tick for seen
    });

    function sendMessage() {
        const msg = input.value.trim();
        if (!msg || !secretKey || !socket.connected) return;

        const msgId = "msg_" + Date.now();
        const encrypted = CryptoJS.AES.encrypt(msg, secretKey).toString();
        
        socket.emit("sendMessage", { 
            message: encrypted, 
            msgId: msgId, 
            replyTo: replyToMsg // Send reply data if exists
        });
        
        addMessage(myName + " (You)", msg, "right", msgId, replyToMsg);
        cancelReply(); // Clear reply box after sending
        input.value = "";
        input.style.height = "auto";
        socket.emit("stopTyping");
    }

    // --- 3. DRAG TO REPLY LOGIC ---
    function addMessage(name, text, side, msgId, replyData = null) {
        const div = document.createElement("div");
        div.className = `sm-msg ${side}`;
        div.setAttribute("data-id", msgId);
        
        let replyHtml = replyData ? `<div class="sm-reply-preview">Replying to: ${replyData}</div>` : "";
        // Inside addMessage function...
        let statusHtml = side === "right" ? `<span class="sm-status">✔</span>` : "";

        div.innerHTML = `
            ${replyHtml}
            <div style="font-size:0.7rem;">${name}</div>
            <div>${text} ${statusHtml}</div>
        `;

        // Touch handling for drag-to-reply
        let startX = 0;
        div.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        div.addEventListener('touchmove', (e) => {
            let diff = e.touches[0].clientX - startX;
            if (diff > 50 && side === 'left') div.style.transform = `translateX(${Math.min(diff, 100)}px)`;
        }, {passive: true});
        div.addEventListener('touchend', (e) => {
            if (e.changedTouches[0].clientX - startX > 80 && side === 'left') {
                initiateReply(text);
            }
            div.style.transform = "translateX(0px)";
        });

        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function initiateReply(text) {
        replyToMsg = text;
        input.placeholder = `Replying to: ${text.substring(0, 20)}...`;
        input.focus();
    }

    function cancelReply() {
        replyToMsg = null;
        input.placeholder = "Type...";
    }

    // --- EXISTING LOGIC (TIMER, QUIT, REPORT) ---
    const timerInterval = setInterval(() => {
        const now = Date.now();
        const diff = expireAt - now;
        if (diff <= 0) {
            clearInterval(timerInterval);
            if (window.Android) window.Android.showAd();
            window.location.href = "index.html";
        } else {
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("timerBox").textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
        }
    }, 1000);

    socket.on("connect", () => { socket.emit("joinRoom", { roomId, passcode, name: myName }); });
    sendBtn.addEventListener("click", sendMessage);
    
    document.getElementById("quitBtn").addEventListener("click", () => {
        if (confirm("Quit and delete chat history?")) {
            if (window.Android) window.Android.showAd();
            socket.emit("destroyRoom");
            window.location.href = "index.html";
        }
    });

    // Typing Logic
    let typingTimer;
    input.addEventListener("input", () => {
        socket.emit(input.value.trim().length > 0 ? "typing" : "stopTyping");
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit("stopTyping"), 2000);
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 110) + "px";
    });

    socket.on("showTyping", ({ from }) => {
        document.getElementById("typingIndicator").style.display = "block";
        document.getElementById("typingIndicator").textContent = `${from} is typing...`;
    });
    socket.on("hideTyping", () => document.getElementById("typingIndicator").style.display = "none");

})(); // Close the IIFE
</script>
</body>
</html>
