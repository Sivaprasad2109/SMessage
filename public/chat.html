<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMessage Chat</title><link rel="stylesheet" href="style.css" />
  <script src="https://blinkchat-i72t.onrender.com/socket.io/socket.io.js"></script>
  <script src="crypto-js/crypto-js.js"></script>
</head>
<body class="sm-page-bg">
  <main class="sm-chat-wrap">
    <header class="sm-chat-header">
  <div class="sm-header-info">
    <div class="sm-chat-title" style="font-weight: 600;">Private Room</div>
    <div class="sm-chat-sub" style="font-size: 0.75rem; opacity: 0.8;">Encrypted</div>
  </div>
  <div class="sm-room-meta">
    <button id="reportBtn" class="sm-btn" style="background: rgba(255,255,255,0.15); color: #fff; padding: 6px 10px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3); margin-right: 5px;">🚩 Report</button>
    
    <span id="roomIdBox" style="font-size: 0.85rem; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 6px;"></span>
    <span id="timerBox" style="font-family: monospace; font-weight: bold;">00:00</span>
    <button id="quitBtn" class="sm-btn" style="background:#fff; color:#0a53c9; padding: 6px 12px; font-size: 0.85rem; border-radius: 8px;">Quit</button>
  </div>
</header>
    <section class="sm-chat-card">
      <div id="typingIndicator" style="display:none; text-align:center;">Friend is typing...</div>
      <div id="messages" class="sm-messages"></div>
      <div class="sm-input-row">
        <textarea id="messageInput" class="sm-message-input" placeholder="Type..." rows="1"></textarea>
        <button id="sendBtn" class="sm-send-btn">Send</button>
      </div>
    </section>
  </main>
<script>
(() => {
    const socket = io("https://blinkchat-i72t.onrender.com", { transports: ["websocket", "polling"], reconnection: true });
    const params = new URLSearchParams(window.location.search);
    
    
    let roomId = params.get("room") || localStorage.getItem("last_room_id");
    let passcode = params.get("p") || localStorage.getItem("last_passcode");
    let secretKey = params.get("key") || localStorage.getItem("last_secret_key");
    // This forces the value to be a number even if it's coming from a URL string
    let expireAt = Number(params.get("expireAt")) || Number(localStorage.getItem("last_expire_at")) || 0;
    let myName = params.get("name") || localStorage.getItem("blinkchat_name") || "Guest";

    if (!roomId || roomId === "null") { window.location.href = "index.html"; return; }

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    document.getElementById("roomIdBox").textContent = `Code: ${passcode}`;
    const timerInterval = setInterval(() => {
        const now = Date.now();
        const diff = expireAt - now;

        if (diff <= 0) {
            clearInterval(timerInterval);
            document.getElementById("timerBox").textContent = "00:00";
            
            // Clean up local storage
            localStorage.removeItem("last_room_id");
            localStorage.removeItem("last_passcode");
            localStorage.removeItem("last_secret_key");
            
            alert("Session Expired");
            window.location.href = "index.html";
        } else {
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            // Display as 00:00 format
            document.getElementById("timerBox").textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
        }
    }, 1000);

    // AUTO-REJOIN ON CONNECT
    socket.on("connect", () => {
    // Pass the name to the server so it knows who joined
    socket.emit("joinRoom", { roomId, passcode, name: myName });
});

function sendMessage() {
    const msg = input.value.trim();
    if (!msg || !secretKey || !socket.connected) return;

    const encrypted = CryptoJS.AES.encrypt(msg, secretKey).toString();
    socket.emit("sendMessage", { message: encrypted });
    
    // Use myName here
    addMessage(myName + " (You)", msg, "right");

    input.value = "";
    input.style.height = "auto";
    socket.emit("stopTyping"); // Stop typing indicator after sending
}


    sendBtn.addEventListener("click", sendMessage);
    socket.on("newMessage", ({ message, from }) => {
        try {
            const dec = CryptoJS.AES.decrypt(message, secretKey).toString(CryptoJS.enc.Utf8);
            if (dec) addMessage(from, dec, "left");
        } catch (e) { addMessage("System", "[Decryption Error]", "center"); }
    });
    // Add this inside the script block in chat.html
    socket.on("roomDestroyed", () => {
    localStorage.removeItem("last_room_id");
    localStorage.removeItem("last_passcode");
    localStorage.removeItem("last_secret_key");
    
    alert("This session has been ended and deleted.");
    window.location.href = "index.html";
    });

    socket.on("systemMessage", msg => addMessage("System", msg, "center"));

    function addMessage(name, text, side) {
        const div = document.createElement("div");
        div.className = `sm-msg ${side}`;
        div.innerHTML = `<div style="font-size:0.7rem;">${name}</div><div>${text}</div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Send typing signals to server

    // Replace your existing quitBtn listener in chat.html
    document.getElementById("quitBtn").addEventListener("click", () => {
    if (confirm("Quit and delete chat history for everyone?")) {
        socket.emit("destroyRoom"); // Tell server to wipe the room
        localStorage.removeItem("last_room_id");
        localStorage.removeItem("last_passcode");
        localStorage.removeItem("last_secret_key");
        window.location.href = "index.html";
    }
    });
    document.getElementById("reportBtn").addEventListener("click", () => {
    // roomId and passcode are already accessible from your existing variables
    if (confirm("Report this room for unusual activity or policy violations?")) {
        const adminEmail = "smessage2109@gmail.com";
        const subject = encodeURIComponent(`SMessage Report: Room ${passcode}`);
        const body = encodeURIComponent(
            `REPORT DETAILS\n` +
            `--------------------------\n` +
            `Room ID: ${roomId}\n` +
            `Passcode: ${passcode}\n\n` +
            `USER DESCRIPTION:\n` +
            `Please describe the activity you are reporting:`
        );
        
        // This opens the default email client on Android/iOS
        window.location.href = `mailto:${adminEmail}?subject=${subject}&body=${body}`;
        
        alert("Report generated. Please send the email so we can take action.");
    }
    });
    /* ===============================
   Auto-grow textarea + Enter send
   =============================== */

/* ===============================
   Typing Status + Auto-grow
   =============================== */
/* =========================================
   Typing Status + Auto-grow UI (Merged)
   ========================================= */
    /* =========================================
       Typing Status + Auto-grow UI (Merged)
       ========================================= */
    let typingTimer; // <--- FIX 1: Define the timer variable here

    input.addEventListener("input", () => {
        // 1. Send Typing Signal to server.js
        if (input.value.trim().length > 0) {
            socket.emit("typing"); 
        } else {
            socket.emit("stopTyping"); 
        }

        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            socket.emit("stopTyping");
        }, 2000);

        // 2. Handle Auto-grow UI logic
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";

        if (input.scrollHeight > 110) {
            input.style.height = "110px";
            input.style.overflowY = "auto";
        } else {
            input.style.overflowY = "hidden";
        }
    });

    // --- FIX 2: Add these listeners so YOU can see when THEY type ---
    const typingIndicator = document.getElementById("typingIndicator");

    socket.on("showTyping", ({ from }) => {
        typingIndicator.style.display = "block";
        typingIndicator.textContent = `${from} is typing...`;
    });

    socket.on("hideTyping", () => {
        typingIndicator.style.display = "none";
    });

    // --- Enter to Send Logic ---
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

})(); // Close the IIFE
</script>
</body>
</html>
