<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="theme-color" content="#0a3d91">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Join Room - SMessage</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="sm-page-bg modern-ui">
  <script>
    (() => {
      const currentTheme = localStorage.getItem("sm_theme") || "dark";
      if (currentTheme === "light") {
        document.body.classList.add("sm-light-theme");
      }
    })();
  </script>

  <div class="sm-aurora-blob blob-1"></div>
  <div class="sm-aurora-blob blob-2"></div>

  <header class="sm-main-header">
    <div class="sm-brand">
      <img src="SMessage.png" alt="SMessage Logo" class="sm-app-icon-mini">
      <div>
        <h1 class="sm-title">SMessage</h1>
        <p class="sm-tagline">Join Existing Room</p>
      </div>
    </div>
    <button id="themeToggleBtn" class="sm-theme-toggle-pill" title="Toggle Theme">🌙</button>
  </header>

  <main class="sm-content-scroll sm-page-entrance" style="padding: 20px;">
    
    <section class="sm-hero-card glassy-hero" style="min-height: auto; flex-direction: column; text-align: center; margin-top: 20px;">
      <h2 style="font-size: 1.5rem; margin-bottom: 10px; color: #1A2D53;">Enter Passcode</h2>
      <p style="color: #5B6B8A; font-size: 0.9rem; margin-bottom: 25px;">Enter the 6-digit code provided by the room creator.</p>
      
      <input id="joinRoomInput" type="number" placeholder="000000" oninput="if(this.value.length > 6) this.value = this.value.slice(0, 6);" style="width: 100%; max-width: 300px; margin: 0 auto; padding: 15px; font-size: 2rem; text-align: center; letter-spacing: 10px; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.08); outline: none; transition: all 0.3s; color: #ffffff; font-weight: 700;" />
      
      <button id="joinRoomSubmit" class="sm-btn sm-btn-primary" style="margin-top: 30px; width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; border-radius: 30px; background: #2C64E3; box-shadow: 0 10px 20px rgba(44,100,227,0.3); margin-left: auto; margin-right: auto; display: block;">Connect to Room</button>
      
      <p id="joinErrorMsg" style="color: #e74c3c; margin-top: 15px; font-size: 0.9rem; font-weight: 600; display: none;">Invalid Passcode</p>
    </section>

  </main>

  <nav class="sm-bottom-nav modern-nav">
    <a href="index.html" class="nav-item" style="text-decoration:none;">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </span>
      <span>Home</span>
    </a>
    
    <a href="create.html" class="nav-item" style="text-decoration:none;">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="16"></line>
          <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
      </span>
      <span>Create</span>
    </a>
    
    <a href="join-room.html" class="nav-item chats-floating active" style="text-decoration:none;">
      <div class="sm-chats-floating-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <span style="display:none;">Chats</span>
    </a>
    
    <a href="join-room.html" class="nav-item" style="text-decoration:none;">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </span>
      <span>Rooms</span>
    </a>
    
    <a href="#" class="nav-item" id="navProfileBtn" style="text-decoration:none;">
      <span class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    if (window.Android) window.Android.setBannerVisible(true);
    window.addEventListener("load", () => {
      // Theme Toggle Logic
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      if (themeToggleBtn) {
        const currentTheme = localStorage.getItem("sm_theme") || "dark";
        themeToggleBtn.textContent = currentTheme === "light" ? "☀️" : "🌙";
        themeToggleBtn.addEventListener("click", () => {
          document.body.classList.toggle("sm-light-theme");
          const isLight = document.body.classList.contains("sm-light-theme");
          localStorage.setItem("sm_theme", isLight ? "light" : "dark");
          themeToggleBtn.textContent = isLight ? "☀️" : "🌙";
        });
      }

      const socket = io(window.location.origin, { transports: ["websocket", "polling"] });
      
      const joinSubmit = document.getElementById('joinRoomSubmit');
      const joinInput = document.getElementById('joinRoomInput');
      const errorMsg = document.getElementById('joinErrorMsg');
      
      // Auto-focus the input
      setTimeout(() => { joinInput.focus(); }, 300);
      
      joinSubmit.addEventListener('click', () => {
        const p = joinInput.value.trim();
        if (p.length === 6) {
          joinSubmit.disabled = true;
          joinSubmit.textContent = 'Connecting...';
          errorMsg.style.display = 'none';
          socket.emit('joinRoom', { passcode: p });
          
          // Re-enable after timeout if no response
          setTimeout(() => {
            if (joinSubmit.disabled) {
              joinSubmit.disabled = false;
              joinSubmit.textContent = 'Connect to Room';
              errorMsg.textContent = 'Connection timeout. Try again.';
              errorMsg.style.display = 'block';
            }
          }, 5000);
        } else {
          errorMsg.textContent = 'Please enter a 6-digit passcode';
          errorMsg.style.display = 'block';
        }
      });
      
      socket.on('joinSuccess', ({ roomId, passcode, expireAt }) => {
        // Stop the timeout re-enable
        joinSubmit.textContent = 'Connected!';
        setTimeout(() => {
          window.location.href = `join.html?room=${roomId}&p=${passcode}&expireAt=${expireAt}`;
        }, 500);
      });
      
      socket.on('error', (err) => {
        joinSubmit.disabled = false;
        joinSubmit.textContent = 'Connect to Room';
        errorMsg.textContent = err.message || 'Invalid Passcode';
        errorMsg.style.display = 'block';
      });

      // Profile Tab Action
      const profileBtn = document.getElementById("navProfileBtn");
      if (profileBtn) {
        profileBtn.addEventListener("click", (e) => {
          e.preventDefault();
          const userId = localStorage.getItem("sm_user_id") || "Anonymous";
          const streak = localStorage.getItem("sm_streak") || "1";
          alert(`👤 SMessage Profile\n\nAnonymous UserID:\n${userId}\n\nActive Streak: ${streak} Days\n\nMaintain your daily streak to unlock premium chat backgrounds!`);
        });
      }
    });
  </script>
</body>
</html>
